name: native-build

on:
  push:
    paths:
      - 'native/**'
      - '.github/workflows/native-build.yml'
  pull_request:
    paths:
      - 'native/**'
      - '.github/workflows/native-build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ffi-build:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build native FFI crate
        working-directory: native/pdf-inspector-ffi
        run: cargo build --release --locked
